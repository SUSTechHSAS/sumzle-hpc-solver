name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Fast gate: format + clippy + cargo check
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt -- --check
      - run: cargo clippy -- -D warnings
      - run: cargo check

  test:
    name: Test on ${{ matrix.os }}
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macOS-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macOS-latest
            target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test --verbose 2>&1 | tee test-output.txt
        shell: bash

      - name: Create test summary
        if: always()
        shell: bash
        run: |
          echo "## 🧪 Test Results — \`${{ matrix.os }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | \`${{ matrix.os }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Target | \`${{ matrix.target }}\` |" >> $GITHUB_STEP_SUMMARY

          # Build a map of test suite names from "Running ..." lines
          # cargo test --verbose output looks like:
          #   Running unittests src/lib.rs (target/debug/deps/...)
          #   ...test output...
          #   test result: ok. 12 passed; 0 failed; ...
          #   Running unittests src/main.rs (target/debug/deps/...)
          #   ...test output...
          #   test result: ok. 5 passed; 0 failed; ...
          #   Running doc-tests (target/debug/doctests/...)
          #   ...test output...
          #   test result: ok. 0 passed; 0 failed; ...
          declare -a SUITE_NAMES=()
          while IFS= read -r RUN_LINE; do
            # Extract the suite description: "unittests src/lib.rs", "unittests src/main.rs", "doc-tests", etc.
            SUITE_DESC=$(echo "$RUN_LINE" | sed -n 's/Running \(.*\) (target\/.*/\1/p')
            if [ -n "$SUITE_DESC" ]; then
              SUITE_NAMES+=("$SUITE_DESC")
            fi
          done < <(grep -E '^Running ' test-output.txt || true)

          # Aggregate ALL test result lines (unit tests, integration tests, doc tests, etc.)
          TOTAL_PASSED=0
          TOTAL_FAILED=0
          TOTAL_IGNORED=0
          TOTAL_MEASURED=0
          SUITE_INDEX=0

          while IFS= read -r RESULT_LINE; do
            [ -z "$RESULT_LINE" ] && continue
            SUITE_INDEX=$((SUITE_INDEX + 1))

            PASSED=$(echo "$RESULT_LINE" | grep -oP '\d+(?= passed)' || echo "0")
            FAILED=$(echo "$RESULT_LINE" | grep -oP '\d+(?= failed)' || echo "0")
            IGNORED=$(echo "$RESULT_LINE" | grep -oP '\d+(?= ignored)' || echo "0")
            MEASURED=$(echo "$RESULT_LINE" | grep -oP '\d+(?= measured)' || echo "0")
            DURATION=$(echo "$RESULT_LINE" | grep -oP '[\d.]+s' || echo "N/A")

            TOTAL_PASSED=$((TOTAL_PASSED + PASSED))
            TOTAL_FAILED=$((TOTAL_FAILED + FAILED))
            TOTAL_IGNORED=$((TOTAL_IGNORED + IGNORED))
            TOTAL_MEASURED=$((TOTAL_MEASURED + MEASURED))

            # Get suite name from the Running lines
            SUITE_NAME="Suite #$SUITE_INDEX"
            if [ $SUITE_INDEX -le ${#SUITE_NAMES[@]} ]; then
              SUITE_NAME="${SUITE_NAMES[$((SUITE_INDEX - 1))]}"
            fi

            if [ "$FAILED" -gt 0 ]; then
              STATUS_ICON="❌"
            else
              STATUS_ICON="✅"
            fi
            echo "| → $SUITE_NAME | $STATUS_ICON $PASSED passed, $FAILED failed, $IGNORED ignored ($DURATION) |" >> $GITHUB_STEP_SUMMARY
          done < <(grep -E '^test result:' test-output.txt || true)

          TOTAL=$((TOTAL_PASSED + TOTAL_FAILED + TOTAL_IGNORED + TOTAL_MEASURED))
          echo "| **Total tests** | **$TOTAL** |" >> $GITHUB_STEP_SUMMARY
          echo "| **Passed** | **$TOTAL_PASSED** |" >> $GITHUB_STEP_SUMMARY
          echo "| **Failed** | **$TOTAL_FAILED** |" >> $GITHUB_STEP_SUMMARY
          echo "| **Ignored** | **$TOTAL_IGNORED** |" >> $GITHUB_STEP_SUMMARY
          echo "| **Measured** | **$TOTAL_MEASURED** |" >> $GITHUB_STEP_SUMMARY

          if [ "$TOTAL_FAILED" -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> ⚠️ **$TOTAL_FAILED test(s) failed!**" >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> ✅ All tests passed!" >> $GITHUB_STEP_SUMMARY
          fi

          # Add raw output in collapsible section
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details>" >> $GITHUB_STEP_SUMMARY
          echo "<summary>📝 Raw Test Output</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat test-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY

  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Type check
        working-directory: frontend
        run: npx tsc -b --noEmit

      - name: Run tests
        working-directory: frontend
        run: npm test

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload frontend artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bench-

      - name: Build benchmarks
        run: cargo bench --no-run

      - name: Run CLI benchmarks
        run: |
          cargo build --release

          echo "## 📊 Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Run benchmarks and collect output
          for len in 5 6; do
            OUTPUT=$(./target/release/sumzle-solver bench -l $len 2>&1 || true)
            LINE=$(echo "$OUTPUT" | grep "Length $len:" || true)
            if [ -n "$LINE" ]; then
              echo "$OUTPUT" >> benchmark-output.txt
            fi
          done

          # Build summary table
          echo "| Length | Solutions | Expressions Searched | Time |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-----------|---------------------|------|" >> $GITHUB_STEP_SUMMARY

          while IFS= read -r LINE; do
            LEN=$(echo "$LINE" | sed -n 's/.*Length \([0-9]*\):.*/\1/p')
            SOL=$(echo "$LINE" | sed -n 's/.*: \([0-9]*\) solutions.*/\1/p')
            SRC=$(echo "$LINE" | sed -n 's/.* \([0-9]\+\) searched.*/\1/p')
            TIME=$(echo "$LINE" | sed -n 's/.*searched,[[:space:]]*\(.*\)/\1/p')
            echo "| $LEN | $SOL | $SRC | $TIME |" >> $GITHUB_STEP_SUMMARY
          done < benchmark-output.txt

          echo "" >> $GITHUB_STEP_SUMMARY

          # Add raw output in collapsible section
          echo "<details>" >> $GITHUB_STEP_SUMMARY
          echo "<summary>📝 Raw Benchmark Output</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat benchmark-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> ℹ️ Benchmarks run on GitHub Actions \`ubuntu-latest\` runner. Results may vary due to shared hardware." >> $GITHUB_STEP_SUMMARY

  # Release builds only run on push (not PRs)
  build-release:
    name: Build Release ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: [test, check]
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: sumzle-solver
            asset_name: sumzle-solver-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: sumzle-solver
            asset_name: sumzle-solver-linux-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: sumzle-solver.exe
            asset_name: sumzle-solver-windows-x86_64.exe
          - os: macOS-latest
            target: x86_64-apple-darwin
            artifact_name: sumzle-solver
            asset_name: sumzle-solver-macos-x86_64
          - os: macOS-latest
            target: aarch64-apple-darwin
            artifact_name: sumzle-solver
            asset_name: sumzle-solver-macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-release, frontend]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
