name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Fast gate: format + clippy + cargo check
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt -- --check
      - run: cargo clippy -- -D warnings
      - run: cargo check

  test:
    name: Test on ${{ matrix.os }}
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macOS-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macOS-latest
            target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test --verbose 2>&1 | tee test-output.txt
        shell: bash

      - name: Create test summary
        if: always()
        shell: bash
        run: |
          echo "## 🧪 Test Results — \`${{ matrix.os }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | \`${{ matrix.os }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Target | \`${{ matrix.target }}\` |" >> $GITHUB_STEP_SUMMARY

          # Parse test output with a single awk script (fully portable across
          # Linux, macOS, and Windows Git Bash).  We pipe through sed first to
          # strip any \r characters that Windows cargo may emit.
          #
          # How it works:
          #   1. Collect suite names from "Running <deps/…>" lines (test
          #      execution) and "Doc-tests" marker lines.  Compilation lines
          #      that also mention deps are filtered out by checking that the
          #      line does NOT contain "--crate-name".
          #   2. Parse every "test result:" line for passed/failed/ignored/
          #      measured/duration.
          #   3. In the END block, emit a per-suite summary table and totals.
          sed 's/\r$//' test-output.txt | awk '
            BEGIN { suite_count=0; result_count=0; sumzle_count=0 }

            # ---- suite name extraction ----

            # "Doc-tests" marker (precedes the rustdoc Running line)
            /^[[:space:]]*Doc-tests[[:space:]]/ {
              suite_name[suite_count++] = "Doc-tests"
            }

            # Test-execution "Running" lines.
            # Match paths that go through target/debug/deps/ (or target\debug\deps\)
            # but NOT compilation lines (which contain --crate-name).
            /Running/ && /target[\/\\]debug[\/\\]deps[\/\\]/ && !/--crate-name/ {
              path = $0
              sub(/.*target[\/\\]debug[\/\\]deps[\/\\]/, "", path)
              sub(/[\x27`"].*$/, "", path)   # strip trailing backtick/quote+rest
              sub(/-[^-]+$/, "", path)       # strip -HASH suffix
              sub(/\.exe$/, "", path)        # strip .exe on Windows

              sumzle_count++
              if (path == "sumzle_solver") {
                if (sumzle_count == 1) suite_name[suite_count++] = "unittests (lib)"
                else                   suite_name[suite_count++] = "unittests (bin)"
              } else if (path == "consistency") {
                suite_name[suite_count++] = "integration tests"
              } else {
                suite_name[suite_count++] = path
              }
            }

            # ---- test result parsing ----

            /^test result:/ {
              idx = result_count
              for (i=1; i<=NF; i++) {
                if ($i ~ /^[0-9]+$/ && $(i+1) ~ /^passed/)  passed[idx]  = $i+0
                if ($i ~ /^[0-9]+$/ && $(i+1) ~ /^failed/)  failed[idx]  = $i+0
                if ($i ~ /^[0-9]+$/ && $(i+1) ~ /^ignored/) ignored[idx] = $i+0
                if ($i ~ /^[0-9]+$/ && $(i+1) ~ /^measured/) measured[idx] = $i+0
                if ($i ~ /^[0-9.]+s$/) duration[idx] = $i
              }
              result_count++
            }

            # ---- output ----
            END {
              tp=0; tf=0; ti=0; tm=0
              for (i=0; i<result_count; i++) {
                p  = passed[i]+0;  f = failed[i]+0
                ig = ignored[i]+0; d = duration[i]
                if (d == "") d = "N/A"
                tp += p; tf += f; ti += ig; tm += measured[i]+0
                icon = (f > 0) ? "❌" : "✅"
                name = (i < suite_count) ? suite_name[i] : "Suite #" (i+1)
                printf "| → %s | %s %d passed, %d failed, %d ignored (%s) |\n", \
                       name, icon, p, f, ig, d
              }
              total = tp + tf + ti + tm
              printf "| **Total tests** | **%d** |\n", total
              printf "| **Passed** | **%d** |\n", tp
              printf "| **Failed** | **%d** |\n", tf
              printf "| **Ignored** | **%d** |\n", ti
              printf "| **Measured** | **%d** |\n", tm

              if (tf > 0) printf "\n> ⚠️ **%d test(s) failed!**\n", tf
              else        printf "\n> ✅ All tests passed!\n"
            }
          ' >> $GITHUB_STEP_SUMMARY

          # Add raw output in collapsible section
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details>" >> $GITHUB_STEP_SUMMARY
          echo "<summary>📝 Raw Test Output</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat test-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY

  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Type check
        working-directory: frontend
        run: npx tsc -b --noEmit

      - name: Run tests
        working-directory: frontend
        run: npm test

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload frontend artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bench-

      - name: Build benchmarks
        run: cargo bench --no-run

      - name: Run CLI benchmarks
        run: |
          cargo build --release

          echo "## 📊 Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Run benchmarks and collect output
          for len in 5 6; do
            OUTPUT=$(./target/release/sumzle-solver bench -l $len 2>&1 || true)
            LINE=$(echo "$OUTPUT" | grep "Length $len:" || true)
            if [ -n "$LINE" ]; then
              echo "$OUTPUT" >> benchmark-output.txt
            fi
          done

          # Build summary table
          echo "| Length | Solutions | Expressions Searched | Time |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-----------|---------------------|------|" >> $GITHUB_STEP_SUMMARY

          while IFS= read -r LINE; do
            LEN=$(echo "$LINE" | sed -n 's/.*Length \([0-9]*\):.*/\1/p')
            SOL=$(echo "$LINE" | sed -n 's/.*: \([0-9]*\) solutions.*/\1/p')
            SRC=$(echo "$LINE" | sed -n 's/.* \([0-9]\+\) searched.*/\1/p')
            TIME=$(echo "$LINE" | sed -n 's/.*searched,[[:space:]]*\(.*\)/\1/p')
            echo "| $LEN | $SOL | $SRC | $TIME |" >> $GITHUB_STEP_SUMMARY
          done < benchmark-output.txt

          echo "" >> $GITHUB_STEP_SUMMARY

          # Add raw output in collapsible section
          echo "<details>" >> $GITHUB_STEP_SUMMARY
          echo "<summary>📝 Raw Benchmark Output</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat benchmark-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> ℹ️ Benchmarks run on GitHub Actions \`ubuntu-latest\` runner. Results may vary due to shared hardware." >> $GITHUB_STEP_SUMMARY

  # Release builds only run on push (not PRs)
  build-release:
    name: Build Release ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: [test, check]
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: sumzle-solver
            asset_name: sumzle-solver-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: sumzle-solver
            asset_name: sumzle-solver-linux-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: sumzle-solver.exe
            asset_name: sumzle-solver-windows-x86_64.exe
          - os: macOS-latest
            target: x86_64-apple-darwin
            artifact_name: sumzle-solver
            asset_name: sumzle-solver-macos-x86_64
          - os: macOS-latest
            target: aarch64-apple-darwin
            artifact_name: sumzle-solver
            asset_name: sumzle-solver-macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-release, frontend]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
