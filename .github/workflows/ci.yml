name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Fast gate: format + clippy + cargo check
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt -- --check
      - run: cargo clippy -- -D warnings
      - run: cargo check

  test:
    name: Test on ${{ matrix.os }}
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macOS-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macOS-latest
            target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test --verbose 2>&1 | tee test-output.txt
        shell: bash

      - name: Create test summary
        if: always()
        shell: bash
        run: |
          echo "## 🧪 Test Results — \`${{ matrix.os }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | \`${{ matrix.os }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Target | \`${{ matrix.target }}\` |" >> $GITHUB_STEP_SUMMARY

          # Extract suite names from "Running ..." and "Doc-tests" lines in test output.
          # cargo test --verbose output format (after compilation):
          #      Running `/path/to/target/debug/deps/sumzle_solver-HASH`   (unit tests - lib)
          #      Running `/path/to/target/debug/deps/sumzle_solver-HASH`   (unit tests - bin)
          #      Running `/path/to/target/debug/deps/consistency-HASH`     (integration test)
          #    Doc-tests sumzle_solver
          #      Running `/path/to/rustdoc ...`
          #
          # We derive suite names from the binary names in the Running lines
          # and detect Doc-tests from the "Doc-tests" line.
          SUITE_INDEX=0
          PREV_LINE=""
          declare -a SUITE_NAMES=()
          while IFS= read -r LINE; do
            # Check for "Doc-tests" marker line (appears before doc-test Running line)
            if echo "$LINE" | grep -q 'Doc-tests'; then
              SUITE_NAMES+=("Doc-tests")
              SUITE_INDEX=$((SUITE_INDEX + 1))
              PREV_LINE="$LINE"
              continue
            fi
            # Check for "Running" lines that execute test binaries (after "Finished")
            # Format: "     Running `/path/to/target/debug/deps/NAME-HASH`"
            # or:      "     Running `/path/to/target/debug/deps/NAME-HASH.exe`"
            if echo "$LINE" | grep -q 'Running.*target.*deps'; then
              # Extract the binary name from the path (before the hash)
              BIN_NAME=$(echo "$LINE" | sed 's|.*/deps/||; s|-[^-]*[`]$||; s|\.exe$||')
              if [ -n "$BIN_NAME" ]; then
                # Map binary names to friendly suite names
                case "$BIN_NAME" in
                  sumzle_solver) SUITE_NAMES+=("unittests (lib + bin)") ;;
                  consistency) SUITE_NAMES+=("integration tests (consistency)") ;;
                  *) SUITE_NAMES+=("$BIN_NAME") ;;
                esac
                SUITE_INDEX=$((SUITE_INDEX + 1))
              fi
            fi
            PREV_LINE="$LINE"
          done < test-output.txt

          # Aggregate ALL test result lines (unit tests, integration tests, doc tests, etc.)
          # Use sed/awk instead of grep -oP for macOS (BSD grep) compatibility.
          # "test result:" lines look like:
          #   test result: ok. 37 passed; 0 failed; 0 ignored; 0 measured; 0 filtered out; finished in 0.86s
          TOTAL_PASSED=0
          TOTAL_FAILED=0
          TOTAL_IGNORED=0
          TOTAL_MEASURED=0
          RESULT_INDEX=0

          while IFS= read -r RESULT_LINE; do
            [ -z "$RESULT_LINE" ] && continue
            RESULT_INDEX=$((RESULT_INDEX + 1))

            # Extract numbers using awk (POSIX-compatible, works on macOS BSD grep)
            # Note: $(i+1) uses regex match (^passed) instead of exact string match
            # because the format is "37 passed;" with a trailing semicolon
            PASSED=$(echo "$RESULT_LINE" | awk '{for(i=1;i<=NF;i++) if($i ~ /^[0-9]+$/ && $(i+1) ~ /^passed/) print $i}')
            FAILED=$(echo "$RESULT_LINE" | awk '{for(i=1;i<=NF;i++) if($i ~ /^[0-9]+$/ && $(i+1) ~ /^failed/) print $i}')
            IGNORED=$(echo "$RESULT_LINE" | awk '{for(i=1;i<=NF;i++) if($i ~ /^[0-9]+$/ && $(i+1) ~ /^ignored/) print $i}')
            MEASURED=$(echo "$RESULT_LINE" | awk '{for(i=1;i<=NF;i++) if($i ~ /^[0-9]+$/ && $(i+1) ~ /^measured/) print $i}')
            DURATION=$(echo "$RESULT_LINE" | awk '{for(i=1;i<=NF;i++) if($i ~ /^[0-9.]+s$/) print $i}')

            PASSED=${PASSED:-0}
            FAILED=${FAILED:-0}
            IGNORED=${IGNORED:-0}
            MEASURED=${MEASURED:-0}
            DURATION=${DURATION:-N/A}

            TOTAL_PASSED=$((TOTAL_PASSED + PASSED))
            TOTAL_FAILED=$((TOTAL_FAILED + FAILED))
            TOTAL_IGNORED=$((TOTAL_IGNORED + IGNORED))
            TOTAL_MEASURED=$((TOTAL_MEASURED + MEASURED))

            # Get suite name from the extracted names
            SUITE_NAME="Suite #$RESULT_INDEX"
            if [ $RESULT_INDEX -le ${#SUITE_NAMES[@]} ]; then
              SUITE_NAME="${SUITE_NAMES[$((RESULT_INDEX - 1))]}"
            fi

            if [ "$FAILED" -gt 0 ]; then
              STATUS_ICON="❌"
            else
              STATUS_ICON="✅"
            fi
            echo "| → $SUITE_NAME | $STATUS_ICON $PASSED passed, $FAILED failed, $IGNORED ignored ($DURATION) |" >> $GITHUB_STEP_SUMMARY
          done < <(grep '^test result:' test-output.txt || true)

          TOTAL=$((TOTAL_PASSED + TOTAL_FAILED + TOTAL_IGNORED + TOTAL_MEASURED))
          echo "| **Total tests** | **$TOTAL** |" >> $GITHUB_STEP_SUMMARY
          echo "| **Passed** | **$TOTAL_PASSED** |" >> $GITHUB_STEP_SUMMARY
          echo "| **Failed** | **$TOTAL_FAILED** |" >> $GITHUB_STEP_SUMMARY
          echo "| **Ignored** | **$TOTAL_IGNORED** |" >> $GITHUB_STEP_SUMMARY
          echo "| **Measured** | **$TOTAL_MEASURED** |" >> $GITHUB_STEP_SUMMARY

          if [ "$TOTAL_FAILED" -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> ⚠️ **$TOTAL_FAILED test(s) failed!**" >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> ✅ All tests passed!" >> $GITHUB_STEP_SUMMARY
          fi

          # Add raw output in collapsible section
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details>" >> $GITHUB_STEP_SUMMARY
          echo "<summary>📝 Raw Test Output</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat test-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY

  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Type check
        working-directory: frontend
        run: npx tsc -b --noEmit

      - name: Run tests
        working-directory: frontend
        run: npm test

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload frontend artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bench-

      - name: Build benchmarks
        run: cargo bench --no-run

      - name: Run CLI benchmarks
        run: |
          cargo build --release

          echo "## 📊 Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Run benchmarks and collect output
          for len in 5 6; do
            OUTPUT=$(./target/release/sumzle-solver bench -l $len 2>&1 || true)
            LINE=$(echo "$OUTPUT" | grep "Length $len:" || true)
            if [ -n "$LINE" ]; then
              echo "$OUTPUT" >> benchmark-output.txt
            fi
          done

          # Build summary table
          echo "| Length | Solutions | Expressions Searched | Time |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-----------|---------------------|------|" >> $GITHUB_STEP_SUMMARY

          while IFS= read -r LINE; do
            LEN=$(echo "$LINE" | sed -n 's/.*Length \([0-9]*\):.*/\1/p')
            SOL=$(echo "$LINE" | sed -n 's/.*: \([0-9]*\) solutions.*/\1/p')
            SRC=$(echo "$LINE" | sed -n 's/.* \([0-9]\+\) searched.*/\1/p')
            TIME=$(echo "$LINE" | sed -n 's/.*searched,[[:space:]]*\(.*\)/\1/p')
            echo "| $LEN | $SOL | $SRC | $TIME |" >> $GITHUB_STEP_SUMMARY
          done < benchmark-output.txt

          echo "" >> $GITHUB_STEP_SUMMARY

          # Add raw output in collapsible section
          echo "<details>" >> $GITHUB_STEP_SUMMARY
          echo "<summary>📝 Raw Benchmark Output</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat benchmark-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> ℹ️ Benchmarks run on GitHub Actions \`ubuntu-latest\` runner. Results may vary due to shared hardware." >> $GITHUB_STEP_SUMMARY

  # Release builds only run on push (not PRs)
  build-release:
    name: Build Release ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: [test, check]
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: sumzle-solver
            asset_name: sumzle-solver-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: sumzle-solver
            asset_name: sumzle-solver-linux-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: sumzle-solver.exe
            asset_name: sumzle-solver-windows-x86_64.exe
          - os: macOS-latest
            target: x86_64-apple-darwin
            artifact_name: sumzle-solver
            asset_name: sumzle-solver-macos-x86_64
          - os: macOS-latest
            target: aarch64-apple-darwin
            artifact_name: sumzle-solver
            asset_name: sumzle-solver-macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-release, frontend]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
